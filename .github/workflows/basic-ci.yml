name: Basic CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  bridge-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install bridge dependencies
        run: pip install -r services/bridge-api/requirements.txt
      - name: Run bridge smoke check
        run: python scripts/smoke_check.py --bridge-python python

  mission-control-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mission-control
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/mission-control/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  sentinel-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Syntax compile sentinel desktop files
        run: |
          python - <<'PY'
          import py_compile
          from pathlib import Path

          root = Path('apps/sentinel-desktop/sentinel')
          files = sorted(root.glob('*.py'))
          for file in files:
              py_compile.compile(str(file), doraise=True)
          print(f'Compiled {len(files)} files')
          PY
